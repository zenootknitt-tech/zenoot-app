<!DOCTYPE html>
<html lang="id">
<head>

<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Kalam:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>

<button class="hamburger" id="btn-hamburger" onclick="toggleSidebar()" aria-label="Menu">
  <i class="ti ti-menu-2"></i>
</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="spiral" aria-hidden="true">
  <div class="hole"></div><div class="hole"></div><div class="hole"></div>
  <div class="hole"></div><div class="hole"></div><div class="hole"></div>

  <div class="hole"></div><div class="hole"></div><div class="hole"></div>
  <div class="hole"></div><div class="hole"></div>
</div>

<div class="sidebar" id="sidebar">
  <button class="sidebar-minimize-btn" id="btn-minimize" onclick="toggleMinimize()" title="Minimize sidebar">
    <i class="ti ti-chevron-left"></i>
  </button>
  <div class="logo-block">
    <img src="logo.png" alt="zenOt" class="logo-img">
    <div class="logo-text-group">
      <span class="logo-name">zenOt</span>
      <span class="logo-tag">trax operasional</span>
    </div>
  </div>

  <!-- SCROLLABLE NAV AREA — footer tetap di bawah -->
  <div class="sidebar-nav-scroll">

  <!-- OPERASIONAL -->
  <div class="nav-group" id="group-ops">
    <div class="nav-group-header" onclick="toggleNavGroup('group-ops')">
      <span class="nav-group-label">⚙ Operasional</span>
      <span class="nav-group-arrow">▾</span>
    </div>
    <div class="nav-group-body">
      <button class="nav-item active" onclick="gotoPage('dashboard',this)"><span class="ni-icon"><i class="ti ti-layout-dashboard"></i></span><span class="ni-label">Dashboard</span></button>
      <button class="nav-item" onclick="gotoPage('jurnal-penjualan',this)"><span class="ni-icon"><i class="ti ti-receipt"></i></span><span class="ni-label">Jurnal Penjualan</span></button>
      <button class="nav-item" onclick="gotoPage('stok',this)"><span class="ni-icon"><i class="ti ti-package"></i></span><span class="ni-label">Stok Produk</span></button>
      <button class="nav-item" onclick="gotoPage('restock',this)"><span class="ni-icon"><i class="ti ti-refresh"></i></span><span class="ni-label">Re-Stock</span></button>
      <button class="nav-item" onclick="gotoPage('kas',this)"><span class="ni-icon"><i class="ti ti-cash"></i></span><span class="ni-label">Kas & Jurnal</span></button>
    </div>
  </div>

  <!-- TOKO -->
  <div class="nav-group" id="group-toko">
    <div class="nav-group-header" onclick="toggleNavGroup('group-toko')">
      <span class="nav-group-label">🛒 Toko</span>
      <span class="nav-group-arrow">▾</span>
    </div>
    <div class="nav-group-body">
      <button class="nav-item" onclick="gotoPage('dataorder',this)"><span class="ni-icon"><i class="ti ti-shopping-cart"></i></span><span class="ni-label">Data Order</span></button>
      <button class="nav-item" onclick="gotoPage('rekap',this)"><span class="ni-icon"><i class="ti ti-chart-bar"></i></span><span class="ni-label">Rekap & P&L</span></button>
    </div>
  </div>

  <!-- DATABASE -->
  <div class="nav-group" id="group-db">
    <div class="nav-group-header" onclick="toggleNavGroup('group-db')">
      <span class="nav-group-label">🗄 Database</span>
      <span class="nav-group-arrow">▾</span>
    </div>
    <div class="nav-group-body">
      <button class="nav-item" onclick="gotoPage('produk',this)"><span class="ni-icon"><i class="ti ti-box"></i></span><span class="ni-label">Kelola Produk</span></button>
      <button class="nav-item" onclick="gotoPage('price-list',this)"><span class="ni-icon"><i class="ti ti-tag"></i></span><span class="ni-label">Price List</span></button>
      <button class="nav-item" onclick="gotoPage('channel',this)"><span class="ni-icon"><i class="ti ti-antenna"></i></span><span class="ni-label">Channel</span></button>
      <button class="nav-item" onclick="gotoPage('beban-operasional',this)"><span class="ni-icon"><i class="ti ti-chart-pie"></i></span><span class="ni-label">Beban Operasional</span></button>

  </div>

  <div class="sticky" id="sticky-note">restock MAYRA_MAUVE<br>minggu ini!!</div>

  </div><!-- end sidebar-nav-scroll -->

  <div class="sidebar-footer">
    <span class="footer-by">conceptualized by</span>
    <span class="footer-name">burhanmology</span>

<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title" id="topbar-title">Dashboard</div>
      <div class="page-sub" id="topbar-sub">overview performa hari ini</div>
    </div>

  </div>
  <div class="content">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-stok" class="page"></div>

    <div id="page-kas" class="page"></div>
    <div id="page-jurnal-penjualan" class="page"></div>
    <div id="page-price-list" class="page"></div>

    <div id="page-produk" class="page"></div>
    <div id="page-channel" class="page"></div>
    <div id="page-beban-operasional" class="page"></div>
  </div>
</div>

    <div class="modal-title">Konfirmasi Hapus</div>
    <div id="modal-confirm-msg" style="margin-bottom:16px;font-size:15px"></div>
    <div class="modal-actions">
      <button class="btn btn-primary btn-danger" id="modal-confirm-ok">Hapus</button>
      <button class="btn" onclick="closeModal('modal-confirm')">Batal</button>
    </div>
  </div>
</div>
