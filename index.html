<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.min.js"></script>
<script>
  // AUTO VERSION — timestamp saat file index.html di-deploy ke GitHub
  // Tidak perlu ganti manual selamanya. Setiap file index.html diubah & push,
  // timestamp ini otomatis berubah karena GitHub Pages serve file baru.
  window.APP_VERSION = 'v' + Date.now(); // auto-generated
</script>
<script>
  // Inject ?v= otomatis ke semua script app berdasarkan APP_VERSION
  (function() {
    var v = window.APP_VERSION;
    var scripts = [
      'rough-ui.js','supabase.js','app.js','dashboard.js',
      'produk.js','stok.js','restock.js','kas.js',
      'jurnal-penjualan.js','produk-terjual.js','price-list.js',
      'dataorder.js','rekap.js','channel-master.js',
      'beban-operasional.js','keuangan.js','notif.js'
    ];
    scripts.forEach(function(s) {
      var el = document.createElement('script');
      el.src = s + '?' + v;
      el.async = false; // jaga urutan load: supabase.js harus selesai sebelum dashboard.js dll.
      document.currentScript.parentNode.appendChild(el);
    });
  })();
</script>
<script>
  // Init notifikasi setelah semua script load
document.addEventListener("DOMContentLoaded", function() {
  setTimeout(function() { if (typeof notifInit === "function") notifInit(); }, 2000);
});

function showUpdateBanner() {
    var banner = document.getElementById('update-banner');
    if (banner) banner.style.display = 'flex';
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(function(reg) {

      // ── 1. Sudah ada SW waiting sejak awal (misal: user buka ulang setelah klik Nanti) ──
      if (reg.waiting) {
        showUpdateBanner();
      }

      // ── 2. SW baru ketemu saat install (updatefound dipasang SEBELUM reg.update()) ──
      reg.addEventListener('updatefound', function() {
        var newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', function() {
          // installed + sudah ada controller = ada versi lama yang aktif → ada update baru
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });

      // ── 3. Force cek update setiap buka app (setelah listener terpasang) ──
      reg.update();

      // ── 4. Cek ulang saat user kembali ke tab/app (dari background HP) ──
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') {
          reg.update().then(function() {
            if (reg.waiting) showUpdateBanner();
          }).catch(function(){});
        }
      });

    }).catch(function() {});

    // ── 5. Reload otomatis setelah SW baru take over ──
    var _reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (!_reloading) {
        _reloading = true;
        window.location.reload();
      }
    });
  }

  function _doUpdate() {
    navigator.serviceWorker.getRegistration().then(function(reg) {
      if (reg && reg.waiting) {
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      } else {
        // Fallback: bersihkan cache manual lalu reload
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            Promise.all(keys.map(function(k) { return caches.delete(k); }))
              .then(function() { window.location.reload(true); });
          });
        } else {
          window.location.reload(true);
        }
      }
    });
  }

  function _dismissUpdate() {
    var banner = document.getElementById('update-banner');
    if (banner) banner.style.display = 'none';
    // Banner akan muncul lagi saat app dibuka ulang / kembali dari background
  }
</script>

<!-- Popup Pembaruan Tersedia -->
<div id="update-banner" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:#1a1a1a;color:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 4px 20px rgba(0,0,0,0.4);align-items:center;gap:12px;max-width:320px;width:90%;font-family:inherit">
  <div style="flex:1">
    <div style="font-weight:700;font-size:13px;margin-bottom:2px">🔄 Pembaruan Tersedia!</div>
    <div style="font-size:11px;color:#aaa">Versi baru zenOt siap diinstall</div>
  </div>
  <button onclick="_dismissUpdate()" style="background:transparent;border:1px solid #444;color:#aaa;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer">Nanti</button>
  <button onclick="_doUpdate()" style="background:#4caf50;border:none;color:#fff;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">Update</button>
</div>
